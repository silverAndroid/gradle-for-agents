# GoReleaser configuration file.
# Reference: https://goreleaser.com/customization/builds/
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: gfa
    main: ./cmd/gfa
    binary: gfa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: gradle-for-agents
    main: ./cmd/gradle-for-agents
    binary: gradle-for-agents
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - name: gradle-for-agents
    repository:
      owner: silverAndroid
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/silverAndroid/gradle-for-agents"
    description: "Gradle wrapper for AI agents"
    install: |
      bin.install "gradle-for-agents"
      bin.install "gfa"
    test: |
      system "#{bin}/gradle-for-agents --version"
      system "#{bin}/gfa --version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "merge"
