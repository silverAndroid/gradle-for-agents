# GoReleaser configuration file.
# Reference: https://goreleaser.com/customization/builds/
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: gfa
    main: ./cmd/gfa
    binary: gfa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: gradle-for-agents
    main: ./cmd/gradle-for-agents
    binary: gradle-for-agents
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - name: gradle-for-agents
    repository:
      owner: silverAndroid
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/silverAndroid/gradle-for-agents"
    description: "Gradle wrapper for AI agents"
    binaries:
      - gradle-for-agents
      - gfa
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gradle-for-agents"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gfa"]
          end

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "merge"
